<!DOCTYPE html>
<html>
<head>
  <title>Earning App</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px;
      border-radius: 15px;
    }
    button {
      padding: 15px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: orange;
      width: 200px;
    }
    button:disabled {
      background: gray;
    }
  </style>
</head>
<body>

<h2>💰 Earning App</h2>

<div class="card">
  <h3 id="balance">💰 Balance: 0</h3>
  <button id="adBtn" onclick="watchAd()">📺 Watch Ad</button>
  <p id="timer"></p>
</div>

<script>
const userId = Math.floor(Math.random() * 100000);

const btn = document.getElementById("adBtn");
const timerText = document.getElementById("timer");
const balanceText = document.getElementById("balance");

const API = "https://your-render-url.onrender.com";

// load user
async function loadUser() {
  let res = await fetch(API + "/user", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ id: userId })
  });

  let data = await res.json();
  balanceText.innerText = "💰 Balance: " + data.balance;
}

loadUser();

// watch ad
async function watchAd() {
  let res = await fetch(API + "/watch", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ id: userId })
  });

  let data = await res.json();

  if (!data.success) return;

  window.open("https://your-monetag-link.com");

  balanceText.innerText = "💰 Balance: " + data.balance;

  btn.disabled = true;
  let time = 15;

  let interval = setInterval(() => {
    timerText.innerText = "⏳ Next ad in " + time + " sec";
    time--;

    if (time < 0) {
      clearInterval(interval);
      btn.disabled = false;
      timerText.innerText = "";
    }
  }, 1000);
}
</script>

</body>
</html>
